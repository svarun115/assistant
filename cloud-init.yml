#cloud-config
# Installs Python 3.11, Node 20, and build tools on Ubuntu 22.04 LTS.
# Used by provision-azure.sh via `az vm create --custom-data cloud-init.yml`.
# MCP servers run as systemd services (no Docker required).

package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - build-essential
  - software-properties-common

runcmd:
  # Python 3.11
  - add-apt-repository ppa:deadsnakes/ppa -y
  - apt-get update -q
  - apt-get install -y python3.11 python3.11-venv python3.11-dev

  # Node 20
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs

  # GitHub MCP server binary
  - >-
    GH_VER=$(curl -s https://api.github.com/repos/github/github-mcp-server/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])") &&
    curl -fsSL "https://github.com/github/github-mcp-server/releases/download/${GH_VER}/github-mcp-server_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin

  # Sudoers rule: ubuntu user can manage mcp-* services without password
  - echo 'ubuntu ALL=(ALL) NOPASSWD: /bin/systemctl restart mcp-*, /bin/systemctl start mcp-*, /bin/systemctl stop mcp-*, /bin/systemctl status mcp-*, /bin/systemctl daemon-reload, /usr/bin/cp /home/ubuntu/assistant/systemd/* /etc/systemd/system/, /bin/systemctl enable mcp-*' | tee /etc/sudoers.d/ubuntu-mcp
  - chmod 440 /etc/sudoers.d/ubuntu-mcp

  # Create directory structure with correct ownership
  - mkdir -p /home/ubuntu/assistant/tokens/google
  - mkdir -p /home/ubuntu/assistant/tokens/garmin
  - mkdir -p /home/ubuntu/assistant/data/skills
  - chown -R ubuntu:ubuntu /home/ubuntu/assistant

  # Signal that cloud-init is done
  - touch /tmp/cloud-init-done
