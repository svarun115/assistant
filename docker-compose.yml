version: "3.9"

# Personal Assistant — MCP Servers (Cloud Deployment)
#
# Runs the 5 MCP servers on an Azure VM.
# Nginx (on the host) terminates TLS and proxies each server by path:
#   https://YOUR-DOMAIN/journal-db/mcp  → journal-db:3333
#   https://YOUR-DOMAIN/garmin/mcp      → garmin:5555
#   https://YOUR-DOMAIN/google/mcp      → google-workspace:3000
#   https://YOUR-DOMAIN/places/mcp      → google-places:1111
#   https://YOUR-DOMAIN/splitwise/mcp   → splitwise:4000
#   https://YOUR-DOMAIN/skills/mcp      → skills-data:6666
#
# Authentication: OAuth 2.1 via auth-gateway (JWT Bearer tokens).
# The auth-gateway handles OAuth flows for Claude.ai and Claude Code.
#
# Usage:
#   docker compose --env-file .env.production up -d
#   docker compose --env-file .env.production logs -f garmin

services:

  auth-gateway:
    build:
      context: ./mcp-servers/mcp-auth-gateway
    container_name: mcp-auth-gateway
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  journal-db:
    build:
      context: ./mcp-servers/db-mcp-server
    container_name: journal-db-mcp
    ports:
      - "127.0.0.1:3333:3333"
    env_file: .env.production
    environment:
      APP_ENV: production
    restart: unless-stopped
    healthcheck:
      # curl without -f: any HTTP response (incl. 404) means the server is up
      test: ["CMD-SHELL", "curl -s http://localhost:3333/ > /dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  garmin:
    build:
      context: ./mcp-servers/garmin-mcp-server
    container_name: garmin-mcp
    ports:
      - "127.0.0.1:5555:5555"
    env_file: .env.production
    environment:
      GARMINTOKENS: /app/.garth
    volumes:
      - garmin-tokens:/app/.garth
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5555/ > /dev/null"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3

  google-workspace:
    build:
      context: ./mcp-servers/google-workspace-mcp-server
    container_name: google-workspace-mcp
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env.production
    volumes:
      # token.json is refreshed at runtime (rw). credentials.json is static (ro).
      - ./tokens/google/token.json:/app/token.json
      - ./tokens/google/credentials.json:/app/credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:3000/ > /dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  google-places:
    build:
      context: ./mcp-servers/googleplaces-mcp-server
    container_name: google-places-mcp
    ports:
      - "127.0.0.1:1111:1111"
    env_file: .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:1111/ > /dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  splitwise:
    build:
      context: ./mcp-servers/splitwise-mcp-server
    container_name: splitwise-mcp
    ports:
      - "127.0.0.1:4000:4000"
    env_file: .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4000/ > /dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  github:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: github-mcp
    command: ["--transport", "sse", "--port", "2222"]
    ports:
      - "127.0.0.1:2222:2222"
    env_file: .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:2222/ > /dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  skills-data:
    build:
      context: ./mcp-servers/skills-data-mcp-server
    container_name: skills-data-mcp
    ports:
      - "127.0.0.1:6666:6666"
    volumes:
      - skills-data:/data/skills
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6666/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  garmin-tokens:
    # Persists garth session tokens across container restarts.
    # Initial tokens are copied from local ~/.garminconnect/ via the provision script.
  skills-data:
    # Persists skill data files across container restarts.
