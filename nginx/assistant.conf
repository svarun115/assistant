# Personal Assistant — MCP Servers Nginx Config
#
# Place at: /etc/nginx/sites-available/assistant
# Enable:   sudo ln -s /etc/nginx/sites-available/assistant /etc/nginx/sites-enabled/
# TLS:      sudo certbot --nginx -d YOUR-DOMAIN  (fills in SSL blocks automatically)
# Reload:   sudo nginx -s reload
#
# Routing:
#   https://YOUR-DOMAIN/auth/*                → http://127.0.0.1:8000/*   (OAuth gateway)
#   https://YOUR-DOMAIN/journal-db/mcp        → http://127.0.0.1:3333/mcp
#   https://YOUR-DOMAIN/garmin/mcp            → http://127.0.0.1:5555/mcp
#   https://YOUR-DOMAIN/google/mcp            → http://127.0.0.1:3000/mcp
#   https://YOUR-DOMAIN/places/mcp            → http://127.0.0.1:1111/mcp
#   https://YOUR-DOMAIN/splitwise/mcp         → http://127.0.0.1:4000/mcp
#   https://YOUR-DOMAIN/github/sse            → http://127.0.0.1:2222/sse
#   https://YOUR-DOMAIN/skills/mcp            → http://127.0.0.1:6666/mcp
#
# Authentication: OAuth 2.1 via auth gateway (JWT Bearer tokens)
# All MCP endpoints validated via auth_request to the gateway.

server {
    listen 80;
    server_name YOUR-DOMAIN;
    # certbot will convert this to HTTPS redirect after `certbot --nginx`

    # ── Shared proxy settings ──────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Host $host;
    proxy_set_header    X-Real-IP $remote_addr;
    proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering     off;
    proxy_cache         off;
    proxy_read_timeout  300s;

    # ── Auth subrequest (nginx auth_request) ─────────────────────────
    # Called on every MCP request. Returns 200 if JWT is valid, 401 if not.
    location = /_auth_validate {
        internal;
        proxy_pass http://127.0.0.1:8000/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    # ── OAuth Authorization Server (gateway) ─────────────────────────
    # Handles: /.well-known/oauth-authorization-server, /authorize,
    #          /token, /register, /revoke, /callback, /health
    location /auth/ {
        proxy_pass http://127.0.0.1:8000/;
    }

    # ── RFC 8414 AS Metadata Discovery ───────────────────────────────
    # Issuer is https://DOMAIN/auth, so RFC 8414 says the metadata URL
    # is /.well-known/oauth-authorization-server/auth (path suffix form).
    # Map this to the gateway's /.well-known/oauth-authorization-server.
    location = /.well-known/oauth-authorization-server/auth {
        proxy_pass http://127.0.0.1:8000/.well-known/oauth-authorization-server;
    }

    # ── Protected Resource Metadata (RFC 9728) ───────────────────────
    # Claude.ai/Claude Code discover the auth server via these endpoints.
    location = /.well-known/oauth-protected-resource/journal-db/mcp {
        default_type application/json;
        return 200 '{"resource":"https://YOUR-DOMAIN/journal-db/mcp","authorization_servers":["https://YOUR-DOMAIN/auth"],"bearer_methods_supported":["header"]}';
    }
    location = /.well-known/oauth-protected-resource/garmin/mcp {
        default_type application/json;
        return 200 '{"resource":"https://YOUR-DOMAIN/garmin/mcp","authorization_servers":["https://YOUR-DOMAIN/auth"],"bearer_methods_supported":["header"]}';
    }
    location = /.well-known/oauth-protected-resource/google/mcp {
        default_type application/json;
        return 200 '{"resource":"https://YOUR-DOMAIN/google/mcp","authorization_servers":["https://YOUR-DOMAIN/auth"],"bearer_methods_supported":["header"]}';
    }
    location = /.well-known/oauth-protected-resource/places/mcp {
        default_type application/json;
        return 200 '{"resource":"https://YOUR-DOMAIN/places/mcp","authorization_servers":["https://YOUR-DOMAIN/auth"],"bearer_methods_supported":["header"]}';
    }
    location = /.well-known/oauth-protected-resource/splitwise/mcp {
        default_type application/json;
        return 200 '{"resource":"https://YOUR-DOMAIN/splitwise/mcp","authorization_servers":["https://YOUR-DOMAIN/auth"],"bearer_methods_supported":["header"]}';
    }
    location = /.well-known/oauth-protected-resource/github/sse {
        default_type application/json;
        return 200 '{"resource":"https://YOUR-DOMAIN/github/sse","authorization_servers":["https://YOUR-DOMAIN/auth"],"bearer_methods_supported":["header"]}';
    }
    location = /.well-known/oauth-protected-resource/skills/mcp {
        default_type application/json;
        return 200 '{"resource":"https://YOUR-DOMAIN/skills/mcp","authorization_servers":["https://YOUR-DOMAIN/auth"],"bearer_methods_supported":["header"]}';
    }

    # ── MCP Server Locations (OAuth-protected) ───────────────────────
    location /journal-db/ {
        auth_request /_auth_validate;
        proxy_pass http://127.0.0.1:3333/;
    }

    location /garmin/ {
        auth_request /_auth_validate;
        proxy_pass http://127.0.0.1:5555/;
    }

    location /google/ {
        auth_request /_auth_validate;
        proxy_pass http://127.0.0.1:3000/;
    }

    location /places/ {
        auth_request /_auth_validate;
        proxy_pass http://127.0.0.1:1111/;
    }

    location /splitwise/ {
        auth_request /_auth_validate;
        proxy_pass http://127.0.0.1:4000/;
    }

    location /github/ {
        auth_request /_auth_validate;
        proxy_pass http://127.0.0.1:2222/;
    }

    location /skills/ {
        auth_request /_auth_validate;
        proxy_pass http://127.0.0.1:6666/;
    }

    location / {
        return 404 "Not found\n";
    }
}
